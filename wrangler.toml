#:schema node_modules/wrangler/config-schema.json
name = "chousei"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Cloudflare Workers (using @opennextjs/cloudflare)
main = ".open-next/worker.js"

[assets]
binding = "ASSETS"
directory = ".open-next/assets"

[[d1_databases]]
binding = "DB"
database_name = "chousei-db"
database_id = "876d56d7-77d5-483f-90e2-93d8f2d41130"
migrations_dir = "drizzle"

# Secrets (ADMIN_PASSWORD, RESEND_API_KEY) are managed via the dashboard.
# They persist across deploys because they're encrypted Secrets.
# Non-secret public values go here:
[vars]
NEXT_PUBLIC_APP_URL = "https://chousei.quiet-frog-fb2e.workers.dev"
MAIL_FROM = "mail@olabodistillery.jp"
